<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Financial Overview</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div id="modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(15, 23, 42, 0.4); z-index:999; backdrop-filter: blur(4px);"></div>
    <div id="success-popup" class="success-popup">
      <img src="images/mark.png" alt="Succes Icon">
      <p id="success-para"></p>
      <button class="success-btn">Dismiss</button>
    </div>
    
    <div id="error-Popup" class="error-Popup">
      <img src="images/close.png" alt="Error Icon">
      <p id="error-para" class="error-para"></p>
      <button id="error-close-btn">Acknowledge</button>
    </div>
    <div id="menu">
      <img src="images/open.png" alt="App Logo" id="menu-toggle" />
      <a href="index.html">Home</a>
      <a href="logs.html">Logs</a>
      <a href="saving.html">Insight</a>
    </div>

    <div class="dashboard">
      <header class="dashboard-header">
        <h1>Financial Overview</h1>
      </header>
      <div id="Add-Category-Popup" class="Add-Category-Popup">
        <img class="close-popup" src="images/close-popup.png" alt="Close Icon">
        <label for="Category">Category Name</label>
        <input type="text" id="Category-input" />
        <button class="Add-bnt-pop" id="Category-add-btn">Create Category</button>
      </div>
      <div id="Add-Income-Popup" class="Add-Income-Popup">
        <img class="close-popup" src="images/close-popup.png" alt="Close Icon">
        <label for="Income">Amount Received</label>
        <input type="number" id="Income-input" />
        <button class="Add-bnt-pop" id="Income-add-btn">Confirm Deposit</button>
      </div>
      <div id="Add-Expense-Popup" class="Add-Expense-Popup">
        <img class="close-popup" src="images/close-popup.png" alt="Close Icon">
        <label for="Expense">Amount Spent</label>
        <input type="number" id="Expense-input" />
        <select id="Categories">
          
        </select>
        <button class="Add-bnt-pop" id="Expense-add-btn">Log Transaction</button>
      </div>
      <div class="normal-dashboard">
        <div class="stat-card">
          <img src="images/profits.png" alt="Profit Icon" />
          <p class="card-label">Total Revenue</p>
          <div class="card-value-container">
            <p>$</p>
            <p id="income-para">0</p>
          </div>
        </div>
        <div class="stat-card">
          <img src="images/expense.png" alt="Expense Icon" />
          <p class="card-label">Total Expenditures</p>
          <div class="card-value-container">
            <p>$</p>
            <p id="expense-para">0</p>
          </div>
        </div>

        <div class="stat-card">
          <img src="images/wallet.png" alt="Balance Icon" />
          <p class="card-label">Net Balance</p>
          <div class="card-value-container">
            <p>$</p>
            <p id="balance-para">0</p>
          </div>
        </div>
        <div class="stat-card">
          <img src="images/piggy-bank.png" alt="Saving Icon" />
          <p class="card-label">Savings Rate</p>
          <div class="card-value-container">
            <p id="saving-para">0</p>
            <p>%</p>
          </div>
        </div>

        <div id="actions">
          <button id="show-income-btn">Log Income</button>
          <button id="show-expense-btn">Record Expense</button>
          <button id="show-category-btn">New Category</button>
        </div>
      </div>

      <div class="complex-dashboard">
        <div class="category-canva-container">
          <canvas id="category"></canvas>
        </div>
        <div class="Income-vs-Expense">
          <canvas  id="IncomevsExpense"></canvas>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
